name: Scrape RTS

on:
  schedule:
    - cron: '0 16-23 * * *'
    - cron: '0 0-4 * * *'
    - cron: '0 7,10,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: node scripts/scrape.mjs
      - run: node scripts/scrape-predictions.mjs
      - id: commit
        run: |
          git config user.name "cdm-bot"
          git config user.email "cdm-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: snapshot $(date -u +%FT%TZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: scrape
    if: needs.scrape.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
