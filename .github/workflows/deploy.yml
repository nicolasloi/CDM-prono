name: Deploy

on:
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}
    steps:
      # Toujours construire le dernier état de main : quand ce workflow est
      # appelé par le scrape, le SHA déclencheur est antérieur au commit de
      # données fraîchement poussé — sans ce ref, on déploierait l'ancien état.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
      # actions/deploy-pages échoue occasionnellement pour des raisons transitoires côté GitHub
      # (ex. "Multiple artifacts ... found", "Deployment failed, try again later" — vus tous les
      # deux ce soir, aucun rapport avec notre code). Sans retry, ces échecs restent bloqués
      # jusqu'à une intervention manuelle. On retente donc jusqu'à 3 fois avec un délai croissant.
      - name: Deploy to GitHub Pages (essai 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Attendre avant nouvel essai
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20
      - name: Deploy to GitHub Pages (essai 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Attendre avant dernier essai
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 40
      - name: Deploy to GitHub Pages (essai 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - name: Échec si les 3 essais ont échoué
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && steps.deploy3.outcome == 'failure'
        run: exit 1
