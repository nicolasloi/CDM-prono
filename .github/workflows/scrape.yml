name: Scrape RTS

on:
  schedule:
    # GitHub bride fortement les cron génériques très fréquents (*/5) — on observe en pratique
    # ~1 passage/heure au lieu des 5 min demandées, même sur un dépôt public. Or on connaît
    # maintenant la date/heure exacte de chaque match restant (phase à élimination directe,
    # horaires fixes FIFA) : on cible donc précisément chaque match plutôt qu'un cron générique
    # (minutes "impaires", hors des marques rondes :00/:05/:30 où tout le monde cale son cron —
    # moins de contention, passages beaucoup plus fiables). 3 passages par match : pronos révélés
    # (+7 min), score final (+2h07), filet de sécurité (+3h04, prolongations/tirs au but compris).
    # ⚠️ À mettre à jour à chaque nouveau tour connu (quarts/demies/finale déjà couverts par date,
    # seule l'heure est fixe — pas besoin de connaître les équipes).
    # Brésil–Norvège (8e) — coup d'envoi 2026-07-05 | 22:00 CEST (20:00 UTC)
    - cron: '7 20 5 7 *'  # +7min (pronos révélés)
    - cron: '7 22 5 7 *'  # +127min (score final)
    - cron: '4 23 5 7 *'  # +184min (filet de sécurité)
    # Mexique–Angleterre (8e) — coup d'envoi 2026-07-06 | 02:00 CEST (00:00 UTC)
    - cron: '7 0 6 7 *'  # +7min (pronos révélés)
    - cron: '7 2 6 7 *'  # +127min (score final)
    - cron: '4 3 6 7 *'  # +184min (filet de sécurité)
    # Portugal–Espagne (8e) — coup d'envoi 2026-07-06 | 21:00 CEST (19:00 UTC)
    - cron: '7 19 6 7 *'  # +7min (pronos révélés)
    - cron: '7 21 6 7 *'  # +127min (score final)
    - cron: '4 22 6 7 *'  # +184min (filet de sécurité)
    # USA–Belgique (8e) — coup d'envoi 2026-07-07 | 02:00 CEST (00:00 UTC)
    - cron: '7 0 7 7 *'  # +7min (pronos révélés)
    - cron: '7 2 7 7 *'  # +127min (score final)
    - cron: '4 3 7 7 *'  # +184min (filet de sécurité)
    # Argentine–Egypte (8e) — coup d'envoi 2026-07-07 | 18:00 CEST (16:00 UTC)
    - cron: '7 16 7 7 *'  # +7min (pronos révélés)
    - cron: '7 18 7 7 *'  # +127min (score final)
    - cron: '4 19 7 7 *'  # +184min (filet de sécurité)
    # Suisse–Colombie (8e) — coup d'envoi 2026-07-07 | 22:00 CEST (20:00 UTC)
    - cron: '7 20 7 7 *'  # +7min (pronos révélés)
    - cron: '7 22 7 7 *'  # +127min (score final)
    - cron: '4 23 7 7 *'  # +184min (filet de sécurité)
    # Quart 1 — coup d'envoi 2026-07-09 | 22:00 CEST (20:00 UTC)
    - cron: '7 20 9 7 *'  # +7min (pronos révélés)
    - cron: '7 22 9 7 *'  # +127min (score final)
    - cron: '4 23 9 7 *'  # +184min (filet de sécurité)
    # Quart 2 — coup d'envoi 2026-07-10 | 21:00 CEST (19:00 UTC)
    - cron: '7 19 10 7 *'  # +7min (pronos révélés)
    - cron: '7 21 10 7 *'  # +127min (score final)
    - cron: '4 22 10 7 *'  # +184min (filet de sécurité)
    # Quart 3 — coup d'envoi 2026-07-11 | 23:00 CEST (21:00 UTC)
    - cron: '7 21 11 7 *'  # +7min (pronos révélés)
    - cron: '7 23 11 7 *'  # +127min (score final)
    - cron: '4 0 12 7 *'  # +184min (filet de sécurité)
    # Quart 4 — coup d'envoi 2026-07-12 | 03:00 CEST (01:00 UTC)
    - cron: '7 1 12 7 *'  # +7min (pronos révélés)
    - cron: '7 3 12 7 *'  # +127min (score final)
    - cron: '4 4 12 7 *'  # +184min (filet de sécurité)
    # Demi 1 — coup d'envoi 2026-07-14 | 21:00 CEST (19:00 UTC)
    - cron: '7 19 14 7 *'  # +7min (pronos révélés)
    - cron: '7 21 14 7 *'  # +127min (score final)
    - cron: '4 22 14 7 *'  # +184min (filet de sécurité)
    # Demi 2 — coup d'envoi 2026-07-15 | 21:00 CEST (19:00 UTC)
    - cron: '7 19 15 7 *'  # +7min (pronos révélés)
    - cron: '7 21 15 7 *'  # +127min (score final)
    - cron: '4 22 15 7 *'  # +184min (filet de sécurité)
    # Finale 3e place — coup d'envoi 2026-07-18 | 23:00 CEST (21:00 UTC)
    - cron: '7 21 18 7 *'  # +7min (pronos révélés)
    - cron: '7 23 18 7 *'  # +127min (score final)
    - cron: '4 0 19 7 *'  # +184min (filet de sécurité)
    # Finale — coup d'envoi 2026-07-19 | 21:00 CEST (19:00 UTC)
    - cron: '7 19 19 7 *'  # +7min (pronos révélés)
    - cron: '7 21 19 7 *'  # +127min (score final)
    - cron: '4 22 19 7 *'  # +184min (filet de sécurité)
    # Filet de sécurité général (hors des créneaux de match ci-dessus) : 1×/heure, à une minute
    # peu commune (moins de contention que :00/:15/:30/:45) — assez peu fréquent pour ne pas être
    # bridé par GitHub (cf. commentaire ci-dessus).
    - cron: '11 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Évite que deux passages se chevauchent
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      - run: node scripts/scrape.mjs
      - id: commit
        run: |
          git config user.name "cdm-bot"
          git config user.email "cdm-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: maj $(date -u +%FT%TZ)"
            # Intègre d'éventuels commits concurrents avant de pousser, avec retries
            # (évite les rejets « fetch first » qui sautaient le déploiement).
            changed=false
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then changed=true; break; fi
              echo "push rejeté, nouvelle tentative $i…"; sleep $((i * 3))
            done
            echo "changed=$changed" >> "$GITHUB_OUTPUT"
            [ "$changed" = true ] || { echo "push impossible après 5 tentatives"; exit 1; }
          fi

  deploy:
    needs: scrape
    if: needs.scrape.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
