name: Scrape RTS

on:
  schedule:
    # Pendant les matchs (18h–09h CEST = 16h–07h UTC) → toutes les 5 min
    # (repo public = minutes Actions illimitées ; chaque passage déploie aussitôt).
    - cron: '*/5 16-23 * * *'
    - cron: '*/5 0-6 * * *'
    # Hors période (09h–18h CEST = 07h–15h UTC) → toutes les heures à :05
    - cron: '5 7-15 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Évite que deux passages se chevauchent
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      - run: node scripts/scrape.mjs
      - id: commit
        run: |
          git config user.name "cdm-bot"
          git config user.email "cdm-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: maj $(date -u +%FT%TZ)"
            # Intègre d'éventuels commits concurrents avant de pousser, avec retries
            # (évite les rejets « fetch first » qui sautaient le déploiement).
            changed=false
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then changed=true; break; fi
              echo "push rejeté, nouvelle tentative $i…"; sleep $((i * 3))
            done
            echo "changed=$changed" >> "$GITHUB_OUTPUT"
            [ "$changed" = true ] || { echo "push impossible après 5 tentatives"; exit 1; }
          fi

  deploy:
    needs: scrape
    if: needs.scrape.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
